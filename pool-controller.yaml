script:
  - id: apply_water_pump_rpm_request
    mode: restart
    then:
      - lambda: |-
          float operating_min_rpm = id(water_pump_operating_min_rpm).state;
          float operating_max_rpm = id(water_pump_operating_max_rpm).state;
          if (operating_min_rpm < ${water_pump_min_rpm}) {
            operating_min_rpm = ${water_pump_min_rpm};
          }
          if (operating_max_rpm > ${water_pump_max_rpm}) {
            operating_max_rpm = ${water_pump_max_rpm};
          }
          if (operating_max_rpm < operating_min_rpm) {
            operating_max_rpm = operating_min_rpm;
          }
          float override_min_rpm = id(water_pump_min_rpm_override).state;
          float override_max_rpm = id(water_pump_max_rpm_override).state;
          if (override_min_rpm < ${water_pump_min_rpm}) {
            override_min_rpm = ${water_pump_min_rpm};
          }
          if (override_max_rpm > ${water_pump_max_rpm}) {
            override_max_rpm = ${water_pump_max_rpm};
          }
          if (override_max_rpm < override_min_rpm) {
            override_max_rpm = override_min_rpm;
          }
          float effective_min_rpm = id(water_pump_min_rpm_override_active).state ? override_min_rpm : operating_min_rpm;
          float effective_max_rpm = id(water_pump_max_rpm_override_active).state ? override_max_rpm : operating_max_rpm;
          if (effective_max_rpm < effective_min_rpm) {
            if (id(water_pump_max_rpm_override_active).state && !id(water_pump_min_rpm_override_active).state) {
              effective_min_rpm = effective_max_rpm;
            } else {
              effective_max_rpm = effective_min_rpm;
            }
          }
          float requested_rpm = id(water_pump_rpm_target_request).state;
          if (id(water_pump_target_rpm_override_active).state) {
            requested_rpm = id(water_pump_target_rpm_override).state;
          }
          if (requested_rpm < ${water_pump_min_rpm}) {
            requested_rpm = ${water_pump_min_rpm};
          }
          if (requested_rpm > ${water_pump_max_rpm}) {
            requested_rpm = ${water_pump_max_rpm};
          }
      - number.set:
          id: water_pump_rpm_command
          value: !lambda |-
            float operating_min_rpm = id(water_pump_operating_min_rpm).state;
            float operating_max_rpm = id(water_pump_operating_max_rpm).state;
            if (operating_min_rpm < ${water_pump_min_rpm}) {
              operating_min_rpm = ${water_pump_min_rpm};
            }
            if (operating_max_rpm > ${water_pump_max_rpm}) {
              operating_max_rpm = ${water_pump_max_rpm};
            }
            if (operating_max_rpm < operating_min_rpm) {
              operating_max_rpm = operating_min_rpm;
            }
            float override_min_rpm = id(water_pump_min_rpm_override).state;
            float override_max_rpm = id(water_pump_max_rpm_override).state;
            if (override_min_rpm < ${water_pump_min_rpm}) {
              override_min_rpm = ${water_pump_min_rpm};
            }
            if (override_max_rpm > ${water_pump_max_rpm}) {
              override_max_rpm = ${water_pump_max_rpm};
            }
            if (override_max_rpm < override_min_rpm) {
              override_max_rpm = override_min_rpm;
            }
            float effective_min_rpm = id(water_pump_min_rpm_override_active).state ? override_min_rpm : operating_min_rpm;
            float effective_max_rpm = id(water_pump_max_rpm_override_active).state ? override_max_rpm : operating_max_rpm;
            if (effective_max_rpm < effective_min_rpm) {
              if (id(water_pump_max_rpm_override_active).state && !id(water_pump_min_rpm_override_active).state) {
                effective_min_rpm = effective_max_rpm;
              } else {
                effective_max_rpm = effective_min_rpm;
              }
            }
            float requested_rpm = id(water_pump_rpm_target_request).state;
            const bool target_rpm_override_active = id(water_pump_target_rpm_override_active).state;
            if (target_rpm_override_active) {
              requested_rpm = id(water_pump_target_rpm_override).state;
            }
            if (requested_rpm < ${water_pump_min_rpm}) {
              requested_rpm = ${water_pump_min_rpm};
            }
            if (requested_rpm > ${water_pump_max_rpm}) {
              requested_rpm = ${water_pump_max_rpm};
            }
            float commanded_rpm = requested_rpm;
            if (!target_rpm_override_active) {
              if (commanded_rpm < effective_min_rpm) {
                commanded_rpm = effective_min_rpm;
              }
              if (commanded_rpm > effective_max_rpm) {
                commanded_rpm = effective_max_rpm;
              }
            }
            return commanded_rpm;
      - lambda: |-
          esphome::global_preferences->sync();

  - id: stop_active_chlorine_pump_dose
    mode: restart
    then:
      - script.stop: execute_requested_chlorine_pump_dose
      - lambda: |-
          id(chlorine_pump_dose_active_state) = false;
          id(chlorine_pump_dose_runtime_seconds_pending) = 0.0f;
          id(chlorine_pump_dose_total_runtime_seconds_requested) = 0.0f;
          id(chlorine_pump_dose_active).publish_state(false);
      - if:
          condition:
            switch.is_on: relay1
          then:
            - switch.turn_off: relay1
      - if:
          condition:
            lambda: |-
              return id(chlorine_pump_started_water_pump_by_controller);
          then:
            - switch.turn_off: water_pump
      - lambda: |-
          id(chlorine_pump_started_water_pump_by_controller) = false;
          id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));

  - id: execute_requested_chlorine_pump_dose
    mode: single
    then:
      - lambda: |-
          const float requested_oz = id(chlorine_pump_dose_request_oz).state;
          const float oz_per_min = id(chlorine_pump_oz_per_min).state;
          const float max_single_dose = id(chlorine_pump_max_single_dose_oz).state;
          const float max_daily_dose_ppm = id(chlorine_pump_max_daily_dose_ppm).state;
          const float minimum_rest_seconds = id(chlorine_pump_minimum_rest_seconds).state;
          const float tank_level_oz = id(chlorine_pump_tank_level_oz).state;
          const float tank_low_threshold_oz = id(chlorine_pump_tank_low_threshold_oz).state;
          const float pre_run_seconds = id(chlorine_pump_pre_run_seconds).state;

          id(chlorine_pump_dose_request_valid_state) = true;
          id(chlorine_pump_started_water_pump_by_controller) = false;
          id(chlorine_pump_blocked_reason_state) = "idle";
          id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));

          if (id(chlorine_pump_dose_active_state)) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "dose_in_progress";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
          }
          if (id(chlorine_pump_dose_active_state)) {
            return;
          }

          if (id(chlorine_pump_dose_lockout_state)) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "maintenance_lockout";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (!id(water_pump_comm_healthy).state) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "water_pump_comm_stale";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (requested_oz <= 0.0f) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "invalid_request";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (oz_per_min <= 0.0f) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "invalid_calibration";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (requested_oz > max_single_dose) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "dose_above_max_single";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (tank_level_oz <= tank_low_threshold_oz) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "chlorine_pump_tank_low";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (requested_oz > tank_level_oz) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "insufficient_tank_level";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          const float pool_volume = id(pool_volume_gallons).state;
          const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
          float requested_ppm = 0.0f;
          if (pool_volume > 0.0f && chlorine_strength > 0.0f) {
            requested_ppm = requested_oz * chlorine_strength * 10000.0f / (128.0f * pool_volume);
          }
          if ((pool_volume <= 0.0f || chlorine_strength <= 0.0f) && max_daily_dose_ppm > 0.0f) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "invalid_chemistry_config";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (max_daily_dose_ppm > 0.0f && (id(chlorine_pump_ppm_day_0) + requested_ppm) > max_daily_dose_ppm) {
            id(chlorine_pump_dose_request_valid_state) = false;
            id(chlorine_pump_blocked_reason_state) = "dose_above_daily_max";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            return;
          }

          if (minimum_rest_seconds > 0.0f && id(homeassistant_time).now().is_valid() && id(chlorine_pump_last_dose_completed_epoch) > 0) {
            const int32_t elapsed_since_last_dose = id(homeassistant_time).now().timestamp - id(chlorine_pump_last_dose_completed_epoch);
            if (elapsed_since_last_dose >= 0 && elapsed_since_last_dose < minimum_rest_seconds) {
              id(chlorine_pump_dose_request_valid_state) = false;
              id(chlorine_pump_blocked_reason_state) = "minimum_rest_active";
              id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
              return;
            }
          }

          id(chlorine_pump_dose_runtime_seconds_pending) = (requested_oz / oz_per_min) * 60.0f;
          id(chlorine_pump_dose_total_runtime_seconds_requested) = id(chlorine_pump_dose_runtime_seconds_pending);
          id(chlorine_pump_last_executed_oz) = requested_oz;
          if (pool_volume > 0.0f && chlorine_strength > 0.0f) {
            id(chlorine_pump_last_executed_ppm) = requested_ppm;
          } else {
            id(chlorine_pump_last_executed_ppm) = 0.0f;
          }
          id(chlorine_pump_last_executed_dose_oz_sensor).publish_state(id(chlorine_pump_last_executed_oz));
          id(chlorine_pump_last_executed_dose_ppm_sensor).publish_state(id(chlorine_pump_last_executed_ppm));
          id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
          if (!id(water_pump_running_confirmed).state) {
            id(chlorine_pump_started_water_pump_by_controller) = id(water_pump_switch_command).state <= 0.0f;
          }
          if (pre_run_seconds < 0.0f) {
            id(chlorine_pump_pre_run_seconds).publish_state(0.0f);
          }
      - if:
          condition:
            lambda: |-
              return !id(chlorine_pump_dose_request_valid_state);
          then:
            - script.stop: execute_requested_chlorine_pump_dose
      - lambda: |-
          id(chlorine_pump_dose_active_state) = true;
          id(chlorine_pump_dose_active).publish_state(true);
      - if:
          condition:
            lambda: |-
              return !id(water_pump_running_confirmed).state;
          then:
            - switch.turn_on: water_pump
      - delay: !lambda |-
          return (uint32_t) (std::max(0.0f, id(chlorine_pump_pre_run_seconds).state) * 1000.0f);
      - if:
          condition:
            lambda: |-
              return !id(water_pump_comm_healthy).state;
          then:
            - lambda: |-
                id(chlorine_pump_blocked_reason_state) = "water_pump_comm_stale";
                id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            - script.execute: stop_active_chlorine_pump_dose
            - script.stop: execute_requested_chlorine_pump_dose
      - if:
          condition:
            lambda: |-
              return !id(water_pump_running_confirmed).state;
          then:
            - lambda: |-
                id(chlorine_pump_blocked_reason_state) = "water_pump_start_failed";
                id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            - script.execute: stop_active_chlorine_pump_dose
            - script.stop: execute_requested_chlorine_pump_dose
      - switch.turn_on: relay1
      - delay: !lambda |-
          return (uint32_t) (std::max(0.0f, id(chlorine_pump_dose_total_runtime_seconds_requested)) * 1000.0f);
      - if:
          condition:
            switch.is_on: relay1
          then:
            - switch.turn_off: relay1
      - delay: !lambda |-
          return (uint32_t) (std::max(0.0f, id(chlorine_pump_post_run_seconds).state) * 1000.0f);
      - if:
          condition:
            lambda: |-
              return id(chlorine_pump_started_water_pump_by_controller);
          then:
            - switch.turn_off: water_pump
      - lambda: |-
          id(chlorine_pump_last_completed_runtime_seconds) = id(chlorine_pump_dose_total_runtime_seconds_requested);
          if (id(homeassistant_time).now().is_valid()) {
            id(chlorine_pump_last_dose_completed_epoch) = id(homeassistant_time).now().timestamp;
          }
          id(chlorine_pump_dose_active_state) = false;
          id(chlorine_pump_dose_runtime_seconds_pending) = 0.0f;
          id(chlorine_pump_dose_total_runtime_seconds_requested) = 0.0f;
          id(chlorine_pump_blocked_reason_state) = "idle";
          id(chlorine_pump_started_water_pump_by_controller) = false;
          id(chlorine_pump_dose_active).publish_state(false);
          id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));

  - id: play_alarm_chirp
    then:
      - rtttl.play: "alarm:d=8,o=6,b=240:e,c"


text_sensor:
  - platform: template
    id: controller_wifi_signal_status
    name: "Controller WiFi Signal Status"
    entity_category: diagnostic
    lambda: |-
      const float rssi = id(controller_wifi_signal_dbm).state;
      if (isnan(rssi)) {
        return {"unknown"};
      }
      if (rssi >= -75.0f) {
        return {"good"};
      }
      if (rssi >= -80.0f) {
        return {"fair"};
      }
      return {"poor"};
    update_interval: ${slow_template_update_interval}

  - platform: template
    id: chlorine_pump_dose_blocked_reason
    name: "Chlorine Pump Dose Blocked Reason"
    entity_category: diagnostic
    lambda: |-
      return id(chlorine_pump_blocked_reason_state);
    update_interval: ${slow_template_update_interval}

  - platform: template
    id: chlorine_pump_last_dose_completed_timestamp
    name: "Chlorine Pump Dose Last Completed Timestamp"
    entity_category: diagnostic
    lambda: |-
      if (id(chlorine_pump_last_dose_completed_epoch) == 0) {
        return {"never"};
      }
      time_t completed_at = id(chlorine_pump_last_dose_completed_epoch);
      struct tm *time_info = localtime(&completed_at);
      if (time_info == nullptr) {
        return {"unknown"};
      }
      char buffer[32];
      strftime(buffer, sizeof(buffer), "%Y-%m-%d %H:%M:%S", time_info);
      return {buffer};
    update_interval: ${slow_template_update_interval}

  - platform: template
    id: water_pump_control_state
    name: "Water Pump Control State"
    entity_category: diagnostic
    lambda: |-
      if (!id(water_pump_comm_healthy).state) {
        return {"comm_stale"};
      }
      const float operating_min_rpm = id(water_pump_operating_min_rpm).state;
      const float operating_max_rpm = id(water_pump_operating_max_rpm).state;
      const float override_min_rpm = id(water_pump_min_rpm_override).state;
      const float override_max_rpm = id(water_pump_max_rpm_override).state;
      float effective_min_rpm = id(water_pump_min_rpm_override_active).state ? override_min_rpm : operating_min_rpm;
      float effective_max_rpm = id(water_pump_max_rpm_override_active).state ? override_max_rpm : operating_max_rpm;
      if (effective_max_rpm < effective_min_rpm) {
        if (id(water_pump_max_rpm_override_active).state && !id(water_pump_min_rpm_override_active).state) {
          effective_min_rpm = effective_max_rpm;
        } else {
          effective_max_rpm = effective_min_rpm;
        }
      }
      float requested_rpm = id(water_pump_rpm_target_request).state;
      const bool target_rpm_override_active = id(water_pump_target_rpm_override_active).state;
      if (target_rpm_override_active) {
        requested_rpm = id(water_pump_target_rpm_override).state;
      }
      if (!target_rpm_override_active) {
        if (requested_rpm < effective_min_rpm) {
          if (id(water_pump_min_rpm_override_active).state && override_min_rpm > operating_min_rpm) {
            return {"clamped_by_min_override"};
          }
          return {"clamped_by_min_limit"};
        }
        if (requested_rpm > effective_max_rpm) {
          if (id(water_pump_max_rpm_override_active).state && override_max_rpm < operating_max_rpm) {
            return {"clamped_by_max_override"};
          }
          return {"clamped_by_max_limit"};
        }
      }
      if (id(water_pump_running_confirmed).state) {
        return {"running_confirmed"};
      }
      if (id(water_pump_switch_command).state > 0.0f) {
        return {"enable_requested"};
      }
      return {"disabled"};
    update_interval: ${controller_poll_interval}

  - platform: template
    id: chlorine_pump_control_state
    name: "Chlorine Pump Control State"
    entity_category: diagnostic
    lambda: |-
      if (id(chlorine_pump_dose_active_state)) {
        return {"dose_active"};
      }
      if (id(chlorine_pump_dose_lockout_state)) {
        return {"lockout"};
      }
      if (id(chlorine_pump_tank_low).state) {
        return {"tank_low"};
      }
      if (id(chlorine_pump_blocked_reason_state) != "idle") {
        return {"blocked"};
      }
      return {"idle"};
    update_interval: ${controller_poll_interval}

  - platform: template
    id: water_pump_rpm_override_status
    name: "Water Pump RPM Override Status"
    entity_category: diagnostic
    # This reports whether the live effective window is using the override minimum,
    # maximum, both, or neither.
    lambda: |-
      const bool min_override_active = id(water_pump_min_rpm_override_active).state && fabsf(id(water_pump_min_rpm_override).state - id(water_pump_operating_min_rpm).state) >= 1.0f;
      const bool max_override_active = id(water_pump_max_rpm_override_active).state && fabsf(id(water_pump_max_rpm_override).state - id(water_pump_operating_max_rpm).state) >= 1.0f;
      const bool target_override_active = id(water_pump_target_rpm_override_active).state && fabsf(id(water_pump_target_rpm_override).state - id(water_pump_rpm_target_request).state) >= 1.0f;
      if (min_override_active && max_override_active && target_override_active) {
        return {"all"};
      }
      if (target_override_active && (min_override_active || max_override_active)) {
        return {"target_and_limits"};
      }
      if (min_override_active && max_override_active) {
        return {"both"};
      }
      if (min_override_active) {
        return {"minimum"};
      }
      if (max_override_active) {
        return {"maximum"};
      }
      if (target_override_active) {
        return {"target"};
      }
      if (id(water_pump_min_rpm_override_active).state || id(water_pump_max_rpm_override_active).state || id(water_pump_target_rpm_override_active).state) {
        return {"armed_no_change"};
      }
      return {"idle"};
    update_interval: ${slow_template_update_interval}


button:
  - platform: template
    name: "Chlorine Pump Execute Requested Dose"
    on_press:
      - script.execute: execute_requested_chlorine_pump_dose

  - platform: template
    name: "Chlorine Pump Stop Active Dose"
    on_press:
      - lambda: |-
          id(chlorine_pump_blocked_reason_state) = "dose_stopped_manually";
      - script.execute: stop_active_chlorine_pump_dose

  - platform: restart
    name: "Restart"
    id: restart_button
    entity_category: config