    name: "Chlorine Pump Tank Remaining"
    lambda: |-
      const float tank_capacity = id(chlorine_pump_tank_capacity_oz).state;
      if (tank_capacity <= 0.0f) {
        return 0.0f;
      }
      return std::max(0.0f, id(chlorine_pump_tank_level_oz).state) * 100.0f / tank_capacity;
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:gauge
