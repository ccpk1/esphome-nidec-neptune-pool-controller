      return id(chlorine_pump_ppm_day_0) +
             id(chlorine_pump_ppm_day_1) +
             id(chlorine_pump_ppm_day_2) +
             id(chlorine_pump_ppm_day_3) +
             id(chlorine_pump_ppm_day_4) +
