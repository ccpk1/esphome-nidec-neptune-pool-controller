  - id: chlorine_pump_dose_runtime_seconds_pending
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: chlorine_pump_dose_total_runtime_seconds_requested
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: chlorine_pump_last_executed_oz
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: chlorine_pump_last_executed_ppm
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: chlorine_pump_last_completed_runtime_seconds
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: chlorine_pump_last_dose_completed_epoch
    type: uint32_t
    restore_value: yes
    initial_value: '0'
  - id: chlorine_pump_blocked_reason_state
    type: std::string
    restore_value: no
    initial_value: '"idle"'

interval:
  - interval: ${controller_poll_interval}
    then:
      - if:
          condition:
            binary_sensor.is_on: water_pump_running_confirmed
          then:
            - lambda: |-
                id(water_pump_runtime_day_0_seconds) += 5;
                if (id(water_pump_flow_estimated_gpm).state > 0.0f) {
                  id(water_pump_gallons_day_0) += id(water_pump_flow_estimated_gpm).state / 12.0f;
                }
                if (id(water_pump_power).state > 0.0f) {
                  id(water_pump_energy_day_0_wh) += id(water_pump_power).state / 720.0f;
                }
      - if:
          condition:
            switch.is_on: relay1
          then:
            - lambda: |-
                const float delivered_oz = id(chlorine_pump_oz_per_min).state / 12.0f;
                id(chlorine_pump_runtime_day_0_seconds) += 5;
                id(chlorine_pump_oz_day_0) += delivered_oz;
                float chlorine_tank_level = id(chlorine_pump_tank_level_oz).state - delivered_oz;
                if (chlorine_tank_level < 0.0f) {
                  chlorine_tank_level = 0.0f;
                }
                id(chlorine_pump_tank_level_oz).publish_state(chlorine_tank_level);
                const float pool_volume = id(pool_volume_gallons).state;
                const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
                if (pool_volume > 0.0f && chlorine_strength > 0.0f) {
                  id(chlorine_pump_ppm_day_0) += delivered_oz * chlorine_strength * 10000.0f / (128.0f * pool_volume);
                }
                if (id(chlorine_pump_power_watts).state > 0.0f) {
                  id(chlorine_pump_energy_day_0_wh) += id(chlorine_pump_power_watts).state / 720.0f;
                }
                id(chlorine_pump_dose_runtime_seconds_pending) = std::max(0.0f, id(chlorine_pump_dose_runtime_seconds_pending) - 5.0f);
      - if:
          condition:
            lambda: |-
              return id(chlorine_pump_dose_active_state) && (!id(water_pump_comm_healthy).state || !id(water_pump_running_confirmed).state);
          then:
            - lambda: |-
                if (!id(water_pump_comm_healthy).state) {
                  id(chlorine_pump_blocked_reason_state) = "dose_aborted_water_pump_comm_stale";
                } else {
                  id(chlorine_pump_blocked_reason_state) = "dose_aborted_water_pump_stopped";
                }
            - script.execute: stop_active_chlorine_pump_dose

# Onboard Hardware Buzzer Component
output:
