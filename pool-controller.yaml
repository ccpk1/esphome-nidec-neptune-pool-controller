  - platform: template
    id: water_pump_comm_age_seconds
    name: "Water Pump Communication Age"
    lambda: |-
      if (id(water_pump_last_telemetry_ms) == 0) {
        return ${default_water_pump_comm_stale_seconds};
      }
      return (millis() - id(water_pump_last_telemetry_ms)) / 1000.0f;
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: mdi:timer-alert-outline
    entity_category: diagnostic
    update_interval: ${controller_poll_interval}

  - platform: template
    id: water_pump_effective_min_rpm
    name: "Water Pump Effective Minimum RPM"
    lambda: |-
      float operating_min_rpm = id(water_pump_operating_min_rpm).state;
      float operating_max_rpm = id(water_pump_operating_max_rpm).state;
      if (operating_min_rpm < ${water_pump_min_rpm}) {
        operating_min_rpm = ${water_pump_min_rpm};
      }
      if (operating_max_rpm > ${water_pump_max_rpm}) {
        operating_max_rpm = ${water_pump_max_rpm};
      }
      if (operating_max_rpm < operating_min_rpm) {
        operating_max_rpm = operating_min_rpm;
      }
      float override_min_rpm = id(water_pump_min_rpm_override).state;
      float override_max_rpm = id(water_pump_max_rpm_override).state;
      if (override_min_rpm < ${water_pump_min_rpm}) {
        override_min_rpm = ${water_pump_min_rpm};
      }
      if (override_max_rpm > ${water_pump_max_rpm}) {
        override_max_rpm = ${water_pump_max_rpm};
      }
      if (override_max_rpm < override_min_rpm) {
        override_max_rpm = override_min_rpm;
      }
      float effective_min_rpm = id(water_pump_min_rpm_override_active).state ? override_min_rpm : operating_min_rpm;
      float effective_max_rpm = id(water_pump_max_rpm_override_active).state ? override_max_rpm : operating_max_rpm;
      if (effective_max_rpm < effective_min_rpm && id(water_pump_max_rpm_override_active).state && !id(water_pump_min_rpm_override_active).state) {
        effective_min_rpm = effective_max_rpm;
      }
      return effective_min_rpm;
    unit_of_measurement: "RPM"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:arrow-expand-up
    update_interval: ${slow_template_update_interval}

