    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: chlorine_pump_energy_day_6_wh
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: chlorine_pump_dose_lockout_state
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: water_pump_last_telemetry_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: chlorine_pump_dose_active_state
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: chlorine_pump_dose_request_valid_state
