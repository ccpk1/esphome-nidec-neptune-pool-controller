      }
      if (override_max_rpm < override_min_rpm) {
        override_max_rpm = override_min_rpm;
      }
      float effective_min_rpm = id(water_pump_min_rpm_override_active).state ? override_min_rpm : operating_min_rpm;
      float effective_max_rpm = id(water_pump_max_rpm_override_active).state ? override_max_rpm : operating_max_rpm;
      if (effective_max_rpm < effective_min_rpm) {
        effective_max_rpm = effective_min_rpm;
      }
      return effective_max_rpm;
