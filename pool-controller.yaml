  - platform: template
    id: water_pump_flow_estimated_gpm
    name: "Water Pump Flow Estimate"
    lambda: |-
      if (!id(water_pump_running_confirmed).state) {
        return 0.0f;
      }
      const float rpm = id(water_pump_current_rpm).state;
      if (rpm <= 0.0f) {
        return 0.0f;
      }

      static const size_t point_count = 11;
      static const float rpm_points[point_count] = {
          600.0f, 900.0f, 1200.0f, 1500.0f, 1800.0f, 2100.0f,
          2400.0f, 2700.0f, 3000.0f, 3300.0f, 3450.0f};
      static const float flow_points[point_count] = {
          ${water_pump_flow_gpm_at_600_rpm}, ${water_pump_flow_gpm_at_900_rpm}, ${water_pump_flow_gpm_at_1200_rpm},
          ${water_pump_flow_gpm_at_1500_rpm}, ${water_pump_flow_gpm_at_1800_rpm}, ${water_pump_flow_gpm_at_2100_rpm},
          ${water_pump_flow_gpm_at_2400_rpm}, ${water_pump_flow_gpm_at_2700_rpm}, ${water_pump_flow_gpm_at_3000_rpm},
          ${water_pump_flow_gpm_at_3300_rpm}, ${water_pump_flow_gpm_at_3450_rpm}};

      float estimated_gpm = 0.0f;
      if (rpm <= rpm_points[0]) {
        estimated_gpm = (rpm / rpm_points[0]) * flow_points[0];
      } else {
        estimated_gpm = flow_points[point_count - 1];
        for (size_t index = 1; index < point_count; index++) {
          if (rpm <= rpm_points[index]) {
            const float range = rpm_points[index] - rpm_points[index - 1];
            const float ratio = (rpm - rpm_points[index - 1]) / range;
            estimated_gpm = flow_points[index - 1] + ratio * (flow_points[index] - flow_points[index - 1]);
            break;
          }
        }
      }

      return estimated_gpm > 0.0f ? estimated_gpm : 0.0f;
    unit_of_measurement: "gpm"
    icon: mdi:waves-arrow-right
    accuracy_decimals: 1
    update_interval: ${controller_poll_interval}

  - platform: template
    id: water_pump_runtime_today
