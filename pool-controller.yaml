          id(chlorine_pump_energy_day_4_wh) +
          id(chlorine_pump_energy_day_5_wh) +
          id(chlorine_pump_energy_day_6_wh);
      return energy_wh / 1000.0f;
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: measurement
