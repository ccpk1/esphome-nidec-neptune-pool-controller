      const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
      if (oz_per_min <= 0.0f || pool_volume <= 0.0f || chlorine_strength <= 0.0f) {
        return 0.0f;
      }
      const float remaining_oz = std::max(0.0f, id(chlorine_pump_dose_runtime_seconds_pending)) * oz_per_min / 60.0f;
      return remaining_oz * chlorine_strength * 10000.0f / (128.0f * pool_volume);
    unit_of_measurement: "ppm"
    state_class: measurement
    accuracy_decimals: 2
    icon: mdi:timer-sand
    update_interval: ${controller_poll_interval}

  - platform: template
    id: chlorine_pump_power
