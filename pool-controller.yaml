## Pool controller architecture
##
## This controller has two main jobs:
## - Water pump control: manage the circulation pump's enable state, RPM target,
##   communication state, and RPM guardrails.
## - Chlorine pump dosing: manage requested chlorine doses, execution safety checks,
##   tank state, and delivery tracking.
##
## Both domains keep public intent separate from low-level execution:
## - Intent surfaces: human-facing values that Home Assistant or an operator sets.
##   Examples: Water Pump RPM Target, operating or override min/max numbers,
##   chlorine dose requests, and chlorine tank adjustments.
## - Command and execution surfaces: internal write paths and scripts that send the final
##   clamped water pump command or run a chlorine dose. These stay internal so the public
##   model does not expose protocol details or implementation plumbing.
##
## Water pump concepts used below:
## - Physical limits: the hard pump capabilities from substitutions (`water_pump_min_rpm` and
##   `water_pump_max_rpm`). Nothing can command outside this range.
## - Operating limits: the normal allowed working range for day-to-day automation.
## - Override limits: a temporary alternate min and/or max RPM range that can be enabled when
##   a special operating condition needs it.
## - Override target: a temporary specific RPM request that can replace the normal target
##   while still respecting the physical pump limits and any active effective limits.
## - Effective limits: the live min/max range after combining the normal operating limits
##   with any enabled override limits.
## - Target: the requested RPM, either from the normal public target or the temporary override target.
## - Command: the final RPM actually written to the pump after clamping the target to the
##   current effective limits.
##
## Chlorine concepts used below:
## - Request: the desired chlorine dose staged in either oz or ppm.
## - Execution: a separate explicit step that starts the currently requested dose.
## - Safety gates: dosing only runs when calibration is valid, the request is valid,
##   maintenance lockout is off, and the water pump is confirmed running.
## - Tracking: the controller records chlorine runtime, delivered oz, delivered ppm,
##   last executed dose, tank level, and blocked or abort reasons.
##
## On boot, the controller restores persisted state, recalculates derived request and limit values,
## reclamps the public pump target if needed, and republishes the current diagnostic state.
esphome:
  name: "${device_name}"
  friendly_name: "${device_friendly_name}"
  on_boot:
    priority: -100
    then:
      - lambda: |-
          const float pool_volume = id(pool_volume_gallons).state;
          const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
          float requested_ppm = 0.0f;
          if (pool_volume > 0.0f && chlorine_strength > 0.0f) {
            requested_ppm = id(chlorine_pump_dose_request_oz).state * chlorine_strength * 10000.0f / (128.0f * pool_volume);
          }
          id(chlorine_pump_dose_request_ppm).publish_state(requested_ppm);
          id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
          float chlorine_tank_capacity = id(chlorine_pump_tank_capacity_oz).state;
          float chlorine_tank_level = id(chlorine_pump_tank_level_oz).state;
          if (chlorine_tank_capacity < 0.0f) {
            chlorine_tank_capacity = 0.0f;
            id(chlorine_pump_tank_capacity_oz).publish_state(chlorine_tank_capacity);
          }
          if (chlorine_tank_level > chlorine_tank_capacity) {
            chlorine_tank_level = chlorine_tank_capacity;
            id(chlorine_pump_tank_level_oz).publish_state(chlorine_tank_level);
          }
          if (chlorine_tank_level < 0.0f) {
            chlorine_tank_level = 0.0f;
            id(chlorine_pump_tank_level_oz).publish_state(chlorine_tank_level);
          }
          float chlorine_tank_low_threshold = id(chlorine_pump_tank_low_threshold_oz).state;
          if (chlorine_tank_low_threshold > chlorine_tank_capacity) {
            chlorine_tank_low_threshold = chlorine_tank_capacity;
            id(chlorine_pump_tank_low_threshold_oz).publish_state(chlorine_tank_low_threshold);
          }
          float operating_min_rpm = id(water_pump_operating_min_rpm).state;
          float operating_max_rpm = id(water_pump_operating_max_rpm).state;
          if (operating_min_rpm < ${water_pump_min_rpm}) {
            operating_min_rpm = ${water_pump_min_rpm};
            id(water_pump_operating_min_rpm).publish_state(operating_min_rpm);
          }
          if (operating_max_rpm > ${water_pump_max_rpm}) {
            operating_max_rpm = ${water_pump_max_rpm};
            id(water_pump_operating_max_rpm).publish_state(operating_max_rpm);
          }
          if (operating_max_rpm < operating_min_rpm) {
            operating_max_rpm = operating_min_rpm;
            id(water_pump_operating_max_rpm).publish_state(operating_max_rpm);
          }
          float override_min_rpm = id(water_pump_min_rpm_override).state;
          float override_max_rpm = id(water_pump_max_rpm_override).state;
          if (override_min_rpm < ${water_pump_min_rpm}) {
            override_min_rpm = ${water_pump_min_rpm};
            id(water_pump_min_rpm_override).publish_state(override_min_rpm);
          }
          if (override_max_rpm > ${water_pump_max_rpm}) {
            override_max_rpm = ${water_pump_max_rpm};
            id(water_pump_max_rpm_override).publish_state(override_max_rpm);
          }
          if (override_max_rpm < override_min_rpm) {
            override_max_rpm = override_min_rpm;
            id(water_pump_max_rpm_override).publish_state(override_max_rpm);
          }
          float requested_rpm = id(water_pump_rpm_target_request).state;
          if (requested_rpm < ${water_pump_min_rpm}) {
            requested_rpm = ${water_pump_min_rpm};
            id(water_pump_rpm_target_request).publish_state(requested_rpm);
          }
          if (requested_rpm > ${water_pump_max_rpm}) {
            requested_rpm = ${water_pump_max_rpm};
            id(water_pump_rpm_target_request).publish_state(requested_rpm);
          }
          float override_target_rpm = id(water_pump_target_rpm_override).state;
          if (override_target_rpm < ${water_pump_min_rpm}) {
            override_target_rpm = ${water_pump_min_rpm};
            id(water_pump_target_rpm_override).publish_state(override_target_rpm);
          }
          if (override_target_rpm > ${water_pump_max_rpm}) {
            override_target_rpm = ${water_pump_max_rpm};
            id(water_pump_target_rpm_override).publish_state(override_target_rpm);
          }
      - script.execute: apply_water_pump_rpm_request

# Template adaptation notes:
# - Change substitutions first when reusing this file for another installation.
# - Hardware pins, Modbus settings, relay labels, thresholds, and default pool values
#   are intended to be customized here without editing the logic below.
# - Runtime-tunable calibration values such as pool volume and chlorine pump rates
#   remain exposed as Home Assistant number entities later in the file.
substitutions:
  # --------------------------------------------------------
  # 1. Controller identity and platform
  # --------------------------------------------------------
  device_name: pool-controller
  device_friendly_name: Pool Controller
  flash_write_interval: 4h
  controller_poll_interval: 5s
  slow_template_update_interval: 30s
  buzzer_pin: GPIO21
  status_led_pin: GPIO38
  
  default_pool_volume_gallons: "10000"

  # --------------------------------------------------------
  # 2. Water pump communications, thresholds, and defaults
  # --------------------------------------------------------
  modbus_uart_tx_pin: GPIO17
  modbus_uart_rx_pin: GPIO18
  modbus_uart_baud_rate: "9600"
  water_pump_modbus_address: "240"
  modbus_command_throttle: 200ms
  water_pump_min_rpm: "600"
  water_pump_max_rpm: "3450"
  water_pump_running_min_rpm: "600"
  water_pump_running_min_watts: "10"
  default_water_pump_comm_stale_seconds: "20"

  # Flow calibration curve
  # Replace these values with measured GPM at each RPM point for a new installation.
  # GPM can be estimated from filter pressure measurements and then refined with
  # real-world performance observations for the specific pool plumbing setup.
  water_pump_flow_gpm_at_600_rpm: "12.5"
  water_pump_flow_gpm_at_900_rpm: "18.8"
  water_pump_flow_gpm_at_1200_rpm: "25.0"
  water_pump_flow_gpm_at_1500_rpm: "31.3"
  water_pump_flow_gpm_at_1800_rpm: "37.5"
  water_pump_flow_gpm_at_2100_rpm: "43.8"
  water_pump_flow_gpm_at_2400_rpm: "50.0"
  water_pump_flow_gpm_at_2700_rpm: "56.3"
  water_pump_flow_gpm_at_3000_rpm: "62.5"
  water_pump_flow_gpm_at_3300_rpm: "68.8"
  water_pump_flow_gpm_at_3450_rpm: "72.0"


  # --------------------------------------------------------
  # 3. Chlorine pump subsystem (Relay 1)
  # --------------------------------------------------------
  relay_1_pin: GPIO1
  relay_1_name: Chlorine Pump
  default_chlorine_pump_dose_request_oz: "8.0"
  default_chlorine_pump_max_single_dose_oz: "64.0"
  default_chlorine_pump_max_daily_dose_ppm: "12.0"
  default_chlorine_pump_liquid_strength_percent: "10.0"
  default_chlorine_pump_pre_run_seconds: "30"
  default_chlorine_pump_post_run_seconds: "300"
  default_chlorine_pump_minimum_rest_seconds: "900"
  default_chlorine_pump_tank_capacity_oz: "960"
  default_chlorine_pump_tank_level_oz: "512"
  default_chlorine_pump_tank_low_threshold_oz: "32"
  default_chlorine_pump_oz_per_min: "1.0"
  default_chlorine_pump_power_watts: "90"

  # --------------------------------------------------------
  # 4. Relay 2 spare output - not yet implemented
  # --------------------------------------------------------
  relay_2_pin: GPIO2
  relay_2_name: Relay 2

  # --------------------------------------------------------
  # 5. Relay 3 spare output - not yet implemented
  # --------------------------------------------------------
  relay_3_pin: GPIO41
  relay_3_name: Relay 3

  # --------------------------------------------------------
  # 6. Relay 4 spare output - not yet implemented
  # --------------------------------------------------------
  relay_4_pin: GPIO42
  relay_4_name: Relay 4

  # --------------------------------------------------------
  # 7. Relay 5 spare output - not yet implemented
  # --------------------------------------------------------
  relay_5_pin: GPIO45
  relay_5_name: Relay 5

  # --------------------------------------------------------
  # 8. Relay 6 spare output - not yet implemented
  # --------------------------------------------------------
  relay_6_pin: GPIO46
  relay_6_name: Relay 6

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

logger:
  level: INFO

preferences:
  # These counters change frequently while the pump is running.
  # Batch preference writes so we do not commit every counter update to flash,
  # while still limiting restart loss for short-horizon counters.
  flash_write_interval: "${flash_write_interval}"

api:
  encryption:
    key: !secret esp_api_key
  actions:
    - action: rtttl_play
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'
    - action: chlorine_pump_request_dose_oz
      variables:
        dose_oz: float
      then:
        - lambda: |-
            id(chlorine_pump_dose_request_oz).publish_state(dose_oz);
            const float pool_volume = id(pool_volume_gallons).state;
            const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
            float requested_ppm = 0.0f;
            if (pool_volume > 0.0f && chlorine_strength > 0.0f) {
              requested_ppm = dose_oz * chlorine_strength * 10000.0f / (128.0f * pool_volume);
            }
            id(chlorine_pump_dose_request_ppm).publish_state(requested_ppm);
            id(chlorine_pump_blocked_reason_state) = "idle";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            esphome::global_preferences->sync();
    - action: chlorine_pump_request_dose_ppm
      variables:
        dose_ppm: float
      then:
        - lambda: |-
            const float pool_volume = id(pool_volume_gallons).state;
            const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
            if (pool_volume <= 0.0f || chlorine_strength <= 0.0f) {
              id(chlorine_pump_dose_request_oz).publish_state(0.0f);
              id(chlorine_pump_dose_request_ppm).publish_state(0.0f);
              id(chlorine_pump_blocked_reason_state) = "invalid_chemistry_config";
              id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
              esphome::global_preferences->sync();
              return;
            }

            const float requested_oz = dose_ppm * 128.0f * pool_volume / (chlorine_strength * 10000.0f);
            id(chlorine_pump_dose_request_ppm).publish_state(dose_ppm);
            id(chlorine_pump_dose_request_oz).publish_state(requested_oz);
            id(chlorine_pump_blocked_reason_state) = "idle";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            esphome::global_preferences->sync();
    - action: chlorine_pump_execute_requested_dose
      then:
        - script.execute: execute_requested_chlorine_pump_dose

