              id(chlorine_pump_runtime_day_6_seconds) = id(chlorine_pump_runtime_day_5_seconds);
              id(chlorine_pump_runtime_day_5_seconds) = id(chlorine_pump_runtime_day_4_seconds);
              id(chlorine_pump_runtime_day_4_seconds) = id(chlorine_pump_runtime_day_3_seconds);
              id(chlorine_pump_runtime_day_3_seconds) = id(chlorine_pump_runtime_day_2_seconds);
              id(chlorine_pump_runtime_day_2_seconds) = id(chlorine_pump_runtime_day_1_seconds);
              id(chlorine_pump_runtime_day_1_seconds) = id(chlorine_pump_runtime_day_0_seconds);
              id(chlorine_pump_runtime_day_0_seconds) = 0;

              id(chlorine_pump_oz_day_6) = id(chlorine_pump_oz_day_5);
              id(chlorine_pump_oz_day_5) = id(chlorine_pump_oz_day_4);
              id(chlorine_pump_oz_day_4) = id(chlorine_pump_oz_day_3);
              id(chlorine_pump_oz_day_3) = id(chlorine_pump_oz_day_2);
              id(chlorine_pump_oz_day_2) = id(chlorine_pump_oz_day_1);
              id(chlorine_pump_oz_day_1) = id(chlorine_pump_oz_day_0);
              id(chlorine_pump_oz_day_0) = 0.0f;

              id(chlorine_pump_ppm_day_6) = id(chlorine_pump_ppm_day_5);
              id(chlorine_pump_ppm_day_5) = id(chlorine_pump_ppm_day_4);
              id(chlorine_pump_ppm_day_4) = id(chlorine_pump_ppm_day_3);
              id(chlorine_pump_ppm_day_3) = id(chlorine_pump_ppm_day_2);
              id(chlorine_pump_ppm_day_2) = id(chlorine_pump_ppm_day_1);
              id(chlorine_pump_ppm_day_1) = id(chlorine_pump_ppm_day_0);
              id(chlorine_pump_ppm_day_0) = 0.0f;

              id(chlorine_pump_energy_day_6_wh) = id(chlorine_pump_energy_day_5_wh);
              id(chlorine_pump_energy_day_5_wh) = id(chlorine_pump_energy_day_4_wh);
              id(chlorine_pump_energy_day_4_wh) = id(chlorine_pump_energy_day_3_wh);
              id(chlorine_pump_energy_day_3_wh) = id(chlorine_pump_energy_day_2_wh);
              id(chlorine_pump_energy_day_2_wh) = id(chlorine_pump_energy_day_1_wh);
              id(chlorine_pump_energy_day_1_wh) = id(chlorine_pump_energy_day_0_wh);
              id(chlorine_pump_energy_day_0_wh) = 0.0f;

              esphome::global_preferences->sync();

