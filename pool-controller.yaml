# --------------------------------------------------------
# EXPOSED WRITE INTERFACES FOR MOTOR CONTROL
# --------------------------------------------------------
# Public pump controls expose intent and guardrails.
# The raw Modbus write entities stay internal so the public model remains easy to follow.

number:
  - platform: template
    id: pool_volume_gallons
    name: "Pool Volume Gallons"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_pool_volume_gallons}
    min_value: 1000
    max_value: 100000
    step: 100
    unit_of_measurement: "gal"
    mode: box
    set_action:
      - lambda: |-
          id(pool_volume_gallons).publish_state(x);
          const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
          float requested_ppm = 0.0f;
          if (x > 0.0f && chlorine_strength > 0.0f) {
            requested_ppm = id(chlorine_pump_dose_request_oz).state * chlorine_strength * 10000.0f / (128.0f * x);
          }
          id(chlorine_pump_dose_request_ppm).publish_state(requested_ppm);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_oz_per_min
    name: "Chlorine Pump Ounces Per Minute"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_oz_per_min}
    min_value: 0.1
    max_value: 5.0
    step: 0.001
    unit_of_measurement: "oz/min"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_oz_per_min).publish_state(x);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_liquid_strength_percent
    name: "Chlorine Pump Liquid Strength"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_liquid_strength_percent}
    min_value: 1.0
    max_value: 15.0
    step: 0.1
    unit_of_measurement: "%"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_liquid_strength_percent).publish_state(x);
          const float pool_volume = id(pool_volume_gallons).state;
          float requested_ppm = 0.0f;
          if (pool_volume > 0.0f && x > 0.0f) {
            requested_ppm = id(chlorine_pump_dose_request_oz).state * x * 10000.0f / (128.0f * pool_volume);
          }
          id(chlorine_pump_dose_request_ppm).publish_state(requested_ppm);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_dose_request_oz
    name: "Chlorine Pump Dose Request Oz"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_dose_request_oz}
    min_value: 0.1
    max_value: 128
    step: 0.1
    unit_of_measurement: "oz"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_dose_request_oz).publish_state(x);
          const float pool_volume = id(pool_volume_gallons).state;
          const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
          float requested_ppm = 0.0f;
          if (pool_volume > 0.0f && chlorine_strength > 0.0f) {
            requested_ppm = x * chlorine_strength * 10000.0f / (128.0f * pool_volume);
          }
          id(chlorine_pump_dose_request_ppm).publish_state(requested_ppm);
          id(chlorine_pump_blocked_reason_state) = "idle";
          id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_dose_request_ppm
    name: "Chlorine Pump Dose Request PPM"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: 0.0
    min_value: 0.1
    max_value: 12.0
    step: 0.1
    unit_of_measurement: "ppm"
    mode: box
    set_action:
      - lambda: |-
          const float pool_volume = id(pool_volume_gallons).state;
          const float chlorine_strength = id(chlorine_pump_liquid_strength_percent).state;
          if (pool_volume <= 0.0f || chlorine_strength <= 0.0f) {
            id(chlorine_pump_dose_request_ppm).publish_state(0.0f);
            id(chlorine_pump_dose_request_oz).publish_state(0.0f);
            id(chlorine_pump_blocked_reason_state) = "invalid_chemistry_config";
            id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
            esphome::global_preferences->sync();
            return;
          }

          const float requested_oz = x * 128.0f * pool_volume / (chlorine_strength * 10000.0f);
          id(chlorine_pump_dose_request_ppm).publish_state(x);
          id(chlorine_pump_dose_request_oz).publish_state(requested_oz);
          id(chlorine_pump_blocked_reason_state) = "idle";
          id(chlorine_pump_dose_blocked_reason).publish_state(id(chlorine_pump_blocked_reason_state));
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_max_single_dose_oz
    name: "Chlorine Pump Dose Maximum Single Oz"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_max_single_dose_oz}
    min_value: 1
    max_value: 256
    step: 0.1
    unit_of_measurement: "oz"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_max_single_dose_oz).publish_state(x);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_max_daily_dose_ppm
    name: "Chlorine Pump Dose Maximum Daily PPM"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_max_daily_dose_ppm}
    min_value: 0.1
    max_value: 20.0
    step: 0.1
    unit_of_measurement: "ppm"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_max_daily_dose_ppm).publish_state(x);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_pre_run_seconds
    name: "Chlorine Pump Dose Pre-Run Seconds"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_pre_run_seconds}
    min_value: 0
    max_value: 1800
    step: 5
    unit_of_measurement: "s"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_pre_run_seconds).publish_state(x);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_post_run_seconds
    name: "Chlorine Pump Dose Post-Run Seconds"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_post_run_seconds}
    min_value: 0
    max_value: 3600
    step: 5
    unit_of_measurement: "s"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_post_run_seconds).publish_state(x);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_minimum_rest_seconds
    name: "Chlorine Pump Dose Minimum Rest Seconds"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_minimum_rest_seconds}
    min_value: 0
    max_value: 43200
    step: 30
    unit_of_measurement: "s"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_minimum_rest_seconds).publish_state(x);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_tank_capacity_oz
    name: "Chlorine Pump Tank Capacity"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_tank_capacity_oz}
    min_value: 0
    max_value: 4096
    step: 1
    unit_of_measurement: "oz"
    mode: box
    set_action:
      - lambda: |-
          float tank_capacity = std::max(0.0f, x);
          id(chlorine_pump_tank_capacity_oz).publish_state(tank_capacity);
          if (id(chlorine_pump_tank_level_oz).state > tank_capacity) {
            id(chlorine_pump_tank_level_oz).publish_state(tank_capacity);
          }
          if (id(chlorine_pump_tank_low_threshold_oz).state > tank_capacity) {
            id(chlorine_pump_tank_low_threshold_oz).publish_state(tank_capacity);
          }
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_tank_level_oz
    name: "Chlorine Pump Tank Level"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_tank_level_oz}
    min_value: 0
    max_value: 4096
    step: 1
    unit_of_measurement: "oz"
    mode: box
    set_action:
      - lambda: |-
          float tank_level = x;
          if (tank_level < 0.0f) {
            tank_level = 0.0f;
          }
          if (tank_level > id(chlorine_pump_tank_capacity_oz).state) {
            tank_level = id(chlorine_pump_tank_capacity_oz).state;
          }
          id(chlorine_pump_tank_level_oz).publish_state(tank_level);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_tank_low_threshold_oz
    name: "Chlorine Pump Tank Low Threshold"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_tank_low_threshold_oz}
    min_value: 0
    max_value: 4096
    step: 1
    unit_of_measurement: "oz"
    mode: box
    set_action:
      - lambda: |-
          float tank_low_threshold = x;
          if (tank_low_threshold < 0.0f) {
            tank_low_threshold = 0.0f;
          }
          if (tank_low_threshold > id(chlorine_pump_tank_capacity_oz).state) {
            tank_low_threshold = id(chlorine_pump_tank_capacity_oz).state;
          }
          id(chlorine_pump_tank_low_threshold_oz).publish_state(tank_low_threshold);
          esphome::global_preferences->sync();

  - platform: template
    id: chlorine_pump_power_watts
    name: "Chlorine Pump Power Estimate"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${default_chlorine_pump_power_watts}
    min_value: 1
    max_value: 1500
    step: 1
    unit_of_measurement: "W"
    mode: box
    set_action:
      - lambda: |-
          id(chlorine_pump_power_watts).publish_state(x);
          esphome::global_preferences->sync();

  - platform: template
    id: water_pump_operating_min_rpm
    name: "Water Pump Operating Minimum RPM"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${water_pump_min_rpm}
    min_value: ${water_pump_min_rpm}
    max_value: ${water_pump_max_rpm}
    step: 10
    unit_of_measurement: "RPM"
    mode: box
    set_action:
      - lambda: |-
          float clamped_min_rpm = x;
          const float current_max_rpm = id(water_pump_operating_max_rpm).state;
          if (clamped_min_rpm > current_max_rpm) {
            clamped_min_rpm = current_max_rpm;
          }
          id(water_pump_operating_min_rpm).publish_state(clamped_min_rpm);
      - script.execute: apply_water_pump_rpm_request

  - platform: template
    id: water_pump_operating_max_rpm
    name: "Water Pump Operating Maximum RPM"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${water_pump_max_rpm}
    min_value: ${water_pump_min_rpm}
    max_value: ${water_pump_max_rpm}
    step: 10
    unit_of_measurement: "RPM"
    mode: box
    set_action:
      - lambda: |-
          float clamped_max_rpm = x;
          const float current_min_rpm = id(water_pump_operating_min_rpm).state;
          if (clamped_max_rpm < current_min_rpm) {
            clamped_max_rpm = current_min_rpm;
          }
          id(water_pump_operating_max_rpm).publish_state(clamped_max_rpm);
      - script.execute: apply_water_pump_rpm_request

  # Override values define an alternate temporary operating window.
  # They do nothing until the corresponding override enable switch is turned on.
  - platform: template
    id: water_pump_min_rpm_override
    name: "Water Pump Minimum RPM Override"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${water_pump_min_rpm}
    min_value: ${water_pump_min_rpm}
    max_value: ${water_pump_max_rpm}
    step: 10
    unit_of_measurement: "RPM"
    mode: box
    set_action:
      - lambda: |-
          float clamped_min_rpm = x;
          const float current_max_rpm = id(water_pump_max_rpm_override).state;
          if (clamped_min_rpm > current_max_rpm) {
            clamped_min_rpm = current_max_rpm;
          }
          id(water_pump_min_rpm_override).publish_state(clamped_min_rpm);
      - script.execute: apply_water_pump_rpm_request

  - platform: template
    id: water_pump_max_rpm_override
    name: "Water Pump Maximum RPM Override"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${water_pump_max_rpm}
    min_value: ${water_pump_min_rpm}
    max_value: ${water_pump_max_rpm}
    step: 10
    unit_of_measurement: "RPM"
    mode: box
    set_action:
      - lambda: |-
          float clamped_max_rpm = x;
          const float current_min_rpm = id(water_pump_min_rpm_override).state;
          if (clamped_max_rpm < current_min_rpm) {
            clamped_max_rpm = current_min_rpm;
          }
          id(water_pump_max_rpm_override).publish_state(clamped_max_rpm);
      - script.execute: apply_water_pump_rpm_request

  # Target override forces a temporary specific request without changing the
  # underlying normal target, so disabling it resumes the prior requested RPM.
  - platform: template
    id: water_pump_target_rpm_override
    name: "Water Pump Target RPM Override"
    optimistic: true
    restore_value: true
    entity_category: config
    initial_value: ${water_pump_min_rpm}
    min_value: ${water_pump_min_rpm}
    max_value: ${water_pump_max_rpm}
    step: 10
    unit_of_measurement: "RPM"
    mode: box
    set_action:
      - lambda: |-
          float requested_rpm = x;
          if (requested_rpm < ${water_pump_min_rpm}) {
            requested_rpm = ${water_pump_min_rpm};
          }
          if (requested_rpm > ${water_pump_max_rpm}) {
            requested_rpm = ${water_pump_max_rpm};
          }
            id(water_pump_target_rpm_override).publish_state(requested_rpm);
      - script.execute: apply_water_pump_rpm_request

  - platform: modbus_controller
    modbus_controller_id: pd140
    id: water_pump_switch_command
    name: "Water Pump Enable"
    internal: true
    address: 0
    register_type: holding
    value_type: U_WORD
    min_value: 0
    max_value: 1
    step: 1
    force_new_range: true
    disabled_by_default: true
    on_value:
      then:
        - lambda: |-
            esphome::global_preferences->sync();

  - platform: modbus_controller
    modbus_controller_id: pd140
    id: water_pump_rpm_command
    name: "Water Pump RPM Command"
    internal: true
    address: 1
    register_type: holding
    value_type: U_WORD
    min_value: ${water_pump_min_rpm}
    max_value: ${water_pump_max_rpm}
    step: 10
    force_new_range: true
    on_value:
      then:
        - lambda: |-
            esphome::global_preferences->sync();

  - platform: template
    id: water_pump_rpm_target_request
    name: "Water Pump RPM Target"
    optimistic: true
    restore_value: true
    initial_value: ${water_pump_min_rpm}
    min_value: ${water_pump_min_rpm}
    max_value: ${water_pump_max_rpm}
    step: 10
    unit_of_measurement: "RPM"
    mode: box
    set_action:
      - lambda: |-
          float requested_rpm = x;
          if (requested_rpm < ${water_pump_min_rpm}) {
            requested_rpm = ${water_pump_min_rpm};
          }
          if (requested_rpm > ${water_pump_max_rpm}) {
            requested_rpm = ${water_pump_max_rpm};
          }
          id(water_pump_rpm_target_request).publish_state(requested_rpm);
      - script.execute: apply_water_pump_rpm_request

  # Flow-percent target is intentionally excluded from this configuration.
  # RPM remains the single public water_pump control surface so override and
  # clamp semantics stay consistent and reversible.

# --------------------------------------------------------
# SYSTEM INTEGRATION & RELAYS
# --------------------------------------------------------

binary_sensor:
  - platform: template
    id: water_pump_comm_healthy
    name: "Water Pump Communication Healthy"
    device_class: connectivity
    entity_category: diagnostic
    lambda: |-
      return id(water_pump_last_telemetry_ms) > 0 && (millis() - id(water_pump_last_telemetry_ms)) <= (${default_water_pump_comm_stale_seconds} * 1000UL);

  - platform: template
    id: water_pump_running_confirmed
    name: "Water Pump Running Confirmed"
    device_class: running
    lambda: |-
      if (!id(water_pump_comm_healthy).state) {
        return false;
      }
      return id(water_pump_current_rpm).state >= ${water_pump_running_min_rpm} || id(water_pump_power).state >= ${water_pump_running_min_watts};

  - platform: template
    id: water_pump_rpm_override_active
    name: "Water Pump RPM Override Active"
    lambda: |-
      const bool min_override_active = id(water_pump_min_rpm_override_active).state && fabsf(id(water_pump_min_rpm_override).state - id(water_pump_operating_min_rpm).state) >= 1.0f;
      const bool max_override_active = id(water_pump_max_rpm_override_active).state && fabsf(id(water_pump_max_rpm_override).state - id(water_pump_operating_max_rpm).state) >= 1.0f;
      const bool target_override_active = id(water_pump_target_rpm_override_active).state && fabsf(id(water_pump_target_rpm_override).state - id(water_pump_rpm_target_request).state) >= 1.0f;
      return min_override_active || max_override_active || target_override_active;

  - platform: template
    id: chlorine_pump_dose_active
    name: "Chlorine Pump Dose Active"
    device_class: running
    lambda: |-
      return id(chlorine_pump_dose_active_state);

  - platform: template
    id: chlorine_pump_tank_low
    name: "Chlorine Pump Tank Low"
    device_class: problem
    lambda: |-
      return id(chlorine_pump_tank_level_oz).state <= id(chlorine_pump_tank_low_threshold_oz).state;

  - platform: status
    name: "Status"

  - platform: gpio
    name: "Boot Button"
    pin:
      number: 0
      ignore_strapping_warning: true
      mode:
        input: true
      inverted: true
    disabled_by_default: true
    on_press:
      then:
        - button.press: restart_button

switch:
  - platform: template
    id: water_pump
    name: "Water Pump"
    icon: mdi:pump
    optimistic: true
    lambda: |-
      return id(water_pump_switch_command).state > 0.0f;
    turn_on_action:
      - number.set:
          id: water_pump_switch_command
          value: 1
      - lambda: |-
          esphome::global_preferences->sync();
    turn_off_action:
      - if:
          condition:
            lambda: |-
              return id(chlorine_pump_dose_active_state);
          then:
            - lambda: |-
                id(chlorine_pump_blocked_reason_state) = "dose_aborted_water_pump_off";
            - script.execute: stop_active_chlorine_pump_dose
      - number.set:
          id: water_pump_switch_command
          value: 0
      - lambda: |-
          esphome::global_preferences->sync();

